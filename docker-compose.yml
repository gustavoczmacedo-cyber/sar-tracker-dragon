version: "3.8"

services:

  # ============================================
  # MONGODB - Banco de dados do Orion e STH
  # ============================================
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fiware_network

  # ============================================
  # ORION CONTEXT BROKER - Núcleo do FIWARE
  # ============================================
  orion:
    image: fiware/orion:3.7.0
    container_name: orion
    depends_on:
      - mongodb
    ports:
      - "1026:1026"
    command: -dbhost mongodb -logLevel DEBUG
    networks:
      - fiware_network

  # ============================================
  # IOT AGENT MQTT - Recebe dados do HiveMQ
  # ============================================
  iot-agent:
    image: fiware/iotagent-ul:1.23.0
    container_name: iot-agent
    depends_on:
      - mongodb
      - orion
    ports:
      - "4041:4041"
      - "7896:7896"
    environment:
      - IOTA_CB_HOST=orion
      - IOTA_CB_PORT=1026
      - IOTA_NORTH_PORT=4041
      - IOTA_REGISTRY_TYPE=mongodb
      - IOTA_MONGO_HOST=mongodb
      - IOTA_MONGO_PORT=27017
      - IOTA_MONGO_DB=iotagentul
      - IOTA_MQTT_HOST=broker.hivemq.com
      - IOTA_MQTT_PORT=1883
      - IOTA_DEFAULT_RESOURCE=/iot/d
      - IOTA_PROVIDER_URL=http://iot-agent:4041
      - IOTA_DEFAULT_TRANSPORT=MQTT
    networks:
      - fiware_network

  # ============================================
  # STH-COMET - Histórico de dados temporais
  # ============================================
  sth-comet:
    image: fiware/sth-comet:2.9.0
    container_name: sth-comet
    depends_on:
      - mongodb
    ports:
      - "8666:8666"
    environment:
      - STH_HOST=0.0.0.0
      - STH_PORT=8666
      - DB_PREFIX=sth_
      - DB_URI=mongodb:27017
      - LOGOPS_LEVEL=DEBUG
    networks:
      - fiware_network

  # ============================================
  # NODE-RED - Dashboard em tempo real
  # ============================================
  node-red:
    image: nodered/node-red:3.1.0
    container_name: node-red
    depends_on:
      - orion
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - fiware_network

volumes:
  mongodb_data:
  nodered_data:

networks:
  fiware_network:
    driver: bridge
